name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag_name: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.tag.outputs.tag }}";
            const version = tag.replace(/^v/, "");
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Pocket Rec.709 ${version}`,
              body: [
                "## 📥 Download",
                "",
                "Pick the build for your platform from the assets below.",
                "",
                "| Platform | File |",
                "|----------|------|",
                "| macOS (Apple Silicon) | `*_aarch64.dmg` |",
                "| macOS (Intel) | `*_x64.dmg` |",
                "| Windows | `*_x64-setup.exe` or `*_x64_en-US.msi` |",
                "| Linux | `*_amd64.AppImage` or `*_amd64.deb` |",
                "",
                "## 🛠 Prerequisite",
                "",
                "FFmpeg must be installed on your system:",
                "",
                "```bash",
                "# macOS",
                "brew install ffmpeg",
                "# Windows",
                "winget install ffmpeg",
                "# Linux",
                "sudo apt install ffmpeg",
                "```",
                "",
                "---",
                "",
                "## 📥 下载",
                "",
                "请根据你的平台从下方文件中选择：",
                "",
                "| 平台 | 文件 |",
                "|------|------|",
                "| macOS (Apple Silicon) | `*_aarch64.dmg` |",
                "| macOS (Intel) | `*_x64.dmg` |",
                "| Windows | `*_x64-setup.exe` 或 `*_x64_en-US.msi` |",
                "| Linux | `*_amd64.AppImage` 或 `*_amd64.deb` |",
                "",
                "## 🛠 前置要求",
                "",
                "请先安装 FFmpeg：",
                "",
                "```bash",
                "# macOS",
                "brew install ffmpeg",
                "# Windows",
                "winget install ffmpeg",
                "# Linux",
                "sudo apt install ffmpeg",
                "```",
              ].join("\n"),
              draft: true,
              prerelease: false,
            });
            return data.id;
          result-encoding: string

  build:
    name: Build ${{ matrix.label }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - label: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - label: Linux x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - label: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: "${{ needs.create-release.outputs.release_id }}",
              draft: false,
            });
